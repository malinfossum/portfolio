<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Matte gold gradient (slightly richer) -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#E6C85A"/>
      <stop offset="100%" stop-color="#D9B646"/>
    </linearGradient>

    <!-- Soft noise for hand-crafted feel -->
    <filter id="noise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="turb"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>

    <!-- Soft glow behind the mark -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#E6C85A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Black background kept transparent; use a glow pad instead -->
  <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>

  <!-- MF monogram (Urbanist-like geometry) -->
  <g transform="translate(96,160)" fill="url(#gold)" filter="url(#noise)">
    <!-- M -->
    <path d="M0,192 L0,0 L28,0 L28,132 L74,56 L120,132 L120,0 L148,0 L148,192 L120,192 L74,108 L28,192 Z"/>
    <!-- F -->
    <path d="M190,0 L320,0 L320,24 L218,24 L218,84 L300,84 L300,108 L218,108 L218,192 L190,192 Z"/>
  </g>

  <!-- Leaf (natural curve), slightly lighter gold outline -->
  <g transform="translate(360,160)">
    <path d="M62,36 C40,10 18,6 0,18 C16,18 30,22 40,30 C64,48 70,78 56,112
             C88,96 100,60 92,36 C88,22 76,12 62,10"
          fill="none" stroke="#E3C663" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Tiny stem detail -->
    <path d="M40,30 C44,44 44,62 38,76" fill="none" stroke="#E3C663" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
